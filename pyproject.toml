[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "arch-wiki-mcp"
version = "1.0.0"
description = "Arch Wiki MCP Server - A Truth Perimeter for AI"
authors = [
    { name = "egarcia74" }
]
license = { text = "MIT" }
readme = "README.md"
requires-python = ">=3.10"
dependencies = []

[project.scripts]
arch-wiki-mcp = "src.mcp_server:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["src*"]
